---
- name: Install Docker on Raspberry Pi
  hosts: all
  become: true
  vars:
    upgrade_packages_clean_cache: true
    docker_log_max_size: "10m"
    docker_log_max_files: "3"
    sudo_users:
      - "kranjuli"
      - "ansible"
    app_dir: "/home/kranjuli/web-apps"

  tasks:
    - name: Install Docker dependencies
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
        update_cache: true
      loop:
        - apt-transport-https
        - ca-certificates
        - curl
        - gnupg
        - lsb-release

    - name: Create Docker GPG keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker's official GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.gpg
        mode: '0644'

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ 'arm64' if ansible_architecture == 'aarch64' else 'armhf' }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Update apt cache after adding Docker repository
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Docker
      ansible.builtin.apt:
        name: 
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Docker log rotation configuration
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "{{ docker_log_max_size }}",
              "max-file": "{{ docker_log_max_files }}"
            }
          }
      notify: Restart Docker service

    - name: Docker group - add user to it
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ sudo_users }}"

    - name: Clean apt cache if requested
      ansible.builtin.apt:
        autoclean: true
      when: upgrade_packages_clean_cache

  handlers:
    - name: Restart Docker service
      ansible.builtin.service:
        name: docker
        state: restarted
